<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN - Aura Play</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a1f;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #1DB954;
            margin-bottom: 25px;
            font-size: 2.2em;
            letter-spacing: -0.5px;
            text-shadow: 0 0 10px rgba(29, 185, 84, 0.3);
        }
        .subtitle {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        input[type="password"] {
            width: calc(100% - 24px);
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #0a0a0f;
            color: #fff;
            font-size: 1.2em;
            text-align: center;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="password"]:focus {
            border-color: #1DB954;
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.4);
            outline: none;
        }
        button {
            background-color: #1DB954;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #169e46;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .error-message {
            color: #ff4d4d;
            margin-top: 20px;
            font-size: 0.95em;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aura Play</h1>
        <p class="subtitle">Please enter the access PIN to continue.</p>
        <form id="pinForm" action="/verify_pin" method="POST">
            <input type="password" id="pinInput" name="pin" placeholder="••••" maxlength="4" autofocus>
            <button type="submit">Unlock</button>
        </form>
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pinInput = document.getElementById('pinInput');
            pinInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '').substring(0, 4);
            });
        });
    </script>
</body>
</html>
