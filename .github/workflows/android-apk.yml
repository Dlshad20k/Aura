name: Build Aura APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init Aura com.aura.app

      - name: Add Android Platform
        run: |
          npm install @capacitor/android
          npx cap add android

      - name: Set WebView
        run: |
          mkdir -p www
          echo '<meta http-equiv="refresh" content="0; url=https://intersection-appeals-sponsorship-retirement.trycloudflare.com">' > www/index.html

      - name: Sync
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aura-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
